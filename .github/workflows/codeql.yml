# CodeQL static analysis (SAST) for the auth library.
# Uses the `security-extended` query suite — broader than the default, fitting
# for a package on the authentication path. Results land in the code-scanning
# dashboard. This is the "advanced" (workflow-file) CodeQL setup; do not also
# enable default code scanning in repo Settings, or the two configs conflict.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # TypeScript is analyzed by the javascript-typescript extractor.
        language: ['javascript-typescript']

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
          # scripts/ is non-shipped local dev tooling (e.g. live-xsuaa-check.mjs,
          # which reads the maintainer's own service key to probe XSUAA — that is
          # its purpose). The published surface is src/ → dist/, so exclude
          # scripts/ from SAST to drop false positives (js/file-access-to-http)
          # on dev utilities. src/ + tests/ stay fully analyzed.
          config: |
            paths-ignore:
              - scripts

      - name: Autobuild
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4
        with:
          category: '/language:${{ matrix.language }}'
