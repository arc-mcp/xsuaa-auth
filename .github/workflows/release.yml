name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5
        id: release
        # No release-type here — the action reads release-please-config.json,
        # which sets release-type: node + bump-minor-pre-major: true so breaking
        # changes only bump the minor version while the package is pre-1.0.0.

  publish-npm:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      # OIDC trusted publishing: id-token: write mints the short-lived token npm
      # exchanges for publish + provenance. No NPM_TOKEN secret is used.
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install npm 11.5+ (required for OIDC trusted publishing)
        run: |
          # Pin a single npm version for reproducible publishes. 11.11.1 is >= 11.5.1
          # (the OIDC trusted-publishing floor) and works around the Node v22 bundled
          # npm bug (https://github.com/npm/cli/issues/9151). Do NOT chase npm@latest —
          # an unpinned upgrade makes the release non-reproducible.
          npm install --global npm@11.11.1

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check package exports (publint + attw)
        run: npm run check:exports

      # `publishConfig.provenance: true` in package.json makes `npm publish`
      # attach a provenance attestation automatically under OIDC; the explicit
      # flags below are belt-and-suspenders. `--access public` is required for a
      # scoped package on first publish.
      - name: Publish to npm
        run: npm publish --provenance --access public
